name: Maven Build

on:
  push:
    branches: [ master, miltondev, develop, 'feature/**' ]
  pull_request:
    branches: [ master, develop ]

jobs:
  # Job 1: Test with JDK 11 (backward compatibility)
  agent-compatibility:
    name: Agent Compatibility (JDK 11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set Maven memory options
        run: echo "MAVEN_OPTS=-Xmx1g -XX:MaxMetaspaceSize=256m" >> $GITHUB_ENV

      - name: Build with JDK 11
        run: mvn clean install -B -V

      - name: Upload Agent JAR
        uses: actions/upload-artifact@v4
        with:
          name: agent-jdk11
          path: target/jvmxray-*-agent.jar
          retention-days: 7

  # Job 2: Full Build with JDK 17
  full-build:
    name: Full Build (JDK 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set Maven memory options
        run: echo "MAVEN_OPTS=-Xmx1g -XX:MaxMetaspaceSize=256m" >> $GITHUB_ENV

      - name: Build with Maven
        run: mvn clean install -B -V

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jdk17
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7

      - name: Upload Agent JAR
        uses: actions/upload-artifact@v4
        with:
          name: agent-jdk17
          path: target/jvmxray-*-agent.jar
          retention-days: 7
